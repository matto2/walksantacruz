text: "Matt is engaging and informative, but he doesn't pontificate or try to dominate his walks, which is what makes them great. He is gracious and allows conversation to flow naturally with the stops, letting people relax and take in the scenery without forcefully corralling them around or sticking strictly to an itinerary, like other tours I have experienced. You can tell how knowledgeable Matt is by how little he double-checks his notes while speaking: he has it memorized, confidently, like a tried-and-true local would. His tours are relaxed, entertaining, enlightening, and highly recommended for anyone seeking a bigger, more flavorful slice of Santa Cruz history."
