author: "Mindy"
date: "March 2026"
rating: 5
text: "I highly recommend Walk Santa Cruz tours with Matt. I took the Santa Cruz Surf Walk - History and Culture Tour. Our walk was along beautiful Westcliff Drive and we stopped at different spots and Matt would share his knowledge not only about surfing culture but wave breaks, historical buildings, wetsuit history and even movies that were filmed in the area. Matt made it fun and enjoyable. Whether you're a tourist or a local, like myself, take his tour, you'll be glad you did!"
